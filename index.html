<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Flipper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <h1 class="title">Color Flipper</h1>
      <div class="main">
      <div class="card">
        <div class="btn-row">
          <button class="btn btn-green"  onclick="flip('green',  '#16a34a')">Green</button>
          <button class="btn btn-red"    onclick="flip('red',    '#dc2626')">Red</button>
          <button class="btn btn-blue"   onclick="flip('blue',   '#2563eb')">Blue</button>
          <button class="btn btn-random" onclick="flipRandom()">Random</button>
        </div>
      </div>
        </div>
      </div>
    </div>
  </body>
</html>
